version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
      - ai_service

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL="file:./dev.db"

  ai_service:
    build: ./ai_service
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=YOUR_GROQ_API_KEY
