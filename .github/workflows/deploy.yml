name: AniCart CI/CD Master Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        
    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install
        npm run build

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install
        npx prisma generate

    - name: Test Go Analytics Microservice
      run: |
        cd analytics_service
        go mod tidy
        go build -o analytics

    - name: Verify Docker Compose Build
      run: docker-compose build
